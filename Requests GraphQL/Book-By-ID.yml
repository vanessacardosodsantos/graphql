info:
  name: Book-By-ID
  type: graphql
  seq: 1

graphql:
  method: POST
  url: http://localhost:8080/graphql
  body:
    query: |-
      query bookDetails($id: ID!) {
        bookById(id: $id){
          id
          name
          pageCount
          author {
            firstName
            lastName
          }
        }
      }
    variables: |-
      {
        "id":3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
